components:
  schemas:
    HTTPValidationError:
      properties:
        detail:
          items:
            $ref: '#/components/schemas/ValidationError'
          title: Detail
          type: array
      title: HTTPValidationError
      type: object
    MoveCommand:
      properties:
        move_notation:
          description: Ход в шахматной нотации (например, 'e2e4')
          examples:
          - e2e4
          - g1f3
          maxLength: 5
          minLength: 4
          title: Move Notation
          type: string
      required:
      - move_notation
      title: MoveCommand
      type: object
    ValidationError:
      properties:
        ctx:
          title: Context
          type: object
        input:
          title: Input
        loc:
          items:
            anyOf:
            - type: string
            - type: integer
          title: Location
          type: array
        msg:
          title: Message
          type: string
        type:
          title: Error Type
          type: string
      required:
      - loc
      - msg
      - type
      title: ValidationError
      type: object
info:
  description: Принимает шахматные ходы в нотации, проверяет их легальность с помощью
    библиотеки chess, эмулирует движение робота (2D координаты x, y) и отправляет
    телеметрию сегментами на транспортный уровень. Высота определяется состоянием
    захвата (empty/holding).
  title: 'Агентный уровень: Эмулятор роботизированной руки для игры в шахматы'
  version: 2.0.0
openapi: 3.1.0
paths:
  /code:
    post:
      description: Принимает ход, проверяет легальность и запускает эмуляцию.
      operationId: receive_command_code_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MoveCommand'
        required: true
      responses:
        '202':
          content:
            application/json:
              schema: {}
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: Receive Command
  /reset:
    post:
      operationId: reset_robot_reset_post
      responses:
        '200':
          content:
            application/json:
              schema: {}
          description: Successful Response
      summary: Reset Robot
  /status:
    get:
      operationId: get_status_status_get
      responses:
        '200':
          content:
            application/json:
              schema: {}
          description: Successful Response
      summary: Get Status
